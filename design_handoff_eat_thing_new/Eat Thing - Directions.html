<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Eat Thing — Directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Serif:wght@400;500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400;1,8..60,500&family=Funnel+Display:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="direction-1-pantry-press.jsx"></script>
<script type="text/babel" src="direction-2-kitchen-ledger.jsx"></script>
<script type="text/babel" src="direction-3-greengrocer.jsx"></script>
<script type="text/babel" src="direction-3-greengrocer-v2.jsx"></script>
<script type="text/babel" src="inventory-ledger.jsx"></script>
<script type="text/babel" src="recipes.jsx"></script>
<script type="text/babel" src="meal-plan.jsx"></script>
<script type="text/babel" src="shopping-list.jsx"></script>

<script type="text/babel" data-presets="env,react">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="home"
        title="Eat Thing — home screen, three directions"
        subtitle="Same content, three aesthetics. Drag to reorder · click to expand."
      >
        <DCArtboard id="pantry-press"   label="A · Pantry Press — editorial cookbook" width={1200} height={820}>
          <PantryPress />
        </DCArtboard>
        <DCArtboard id="kitchen-ledger" label="B · Kitchen Ledger — quiet systems"   width={1200} height={820}>
          <KitchenLedger />
        </DCArtboard>
        <DCArtboard id="greengrocer"    label="C · Greengrocer — warm market"        width={1200} height={820}>
          <Greengrocer />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="greengrocer-variants"
        title="Greengrocer — palette & font studies"
        subtitle="Less yellow. Fresh green + crisp blue. Three font pairings."
      >
        <DCArtboard id="gg-geist"     label="C1 · Garden + Geist / Newsreader"        width={1200} height={820}>
          <GGv2 palette={GG_GARDEN}  fonts={GG_FONTS_GEIST}     label="Geist + Newsreader" />
        </DCArtboard>
        <DCArtboard id="gg-schibsted" label="C2 · Crisp + Schibsted / Source Serif 4" width={1200} height={820}>
          <GGv2 palette={GG_CRISP}   fonts={GG_FONTS_SCHIBSTED} label="Schibsted Grotesk + Source Serif 4" />
        </DCArtboard>
        <DCArtboard id="gg-funnel"    label="C3 · Atelier + Funnel Display / Lora"   width={1200} height={820}>
          <GGv2 palette={GG_ATELIER} fonts={GG_FONTS_FUNNEL}    label="Funnel Display + Lora" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="accent-studies"
        title="Accent studies — Crisp palette + Schibsted Grotesk / Lora italic"
        subtitle="Same fresh green workhorse. Four warm complements to the blue."
      >
        <DCArtboard id="acc-terracotta" label="D1 · Terracotta — warm complement"        width={1200} height={820}>
          <GGv2 palette={GG_CRISP_TERRACOTTA} fonts={GG_FONTS_SCHIBSTED_LORA} />
        </DCArtboard>
        <DCArtboard id="acc-persimmon"  label="D2 · Persimmon — playful orange"          width={1200} height={820}>
          <GGv2 palette={GG_CRISP_PERSIMMON}  fonts={GG_FONTS_SCHIBSTED_LORA} />
        </DCArtboard>
        <DCArtboard id="acc-saffron"    label="D3 · Saffron — split-complement, warm"    width={1200} height={820}>
          <GGv2 palette={GG_CRISP_SAFFRON}    fonts={GG_FONTS_SCHIBSTED_LORA} />
        </DCArtboard>
        <DCArtboard id="acc-plum"       label="D4 · Aubergine — split-complement, cool" width={1200} height={820}>
          <GGv2 palette={GG_CRISP_PLUM}       fonts={GG_FONTS_SCHIBSTED_LORA} />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="inventory"
        title="Inventory — populated, real data shape"
        subtitle="Persimmon + Crisp locked. Grouped by location, sorted by expiry. Use-it-up strip up top."
      >
        <DCArtboard id="inv-ledger" label="I1 · Pantry Ledger — grouped, expiry-sorted, dense" width={1280} height={1100}>
          <InventoryLedger />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="recipes"
        title="Recipes — inventory-aware browse"
        subtitle="Cook now / quick shop / library. The product's actual magic."
      >
        <DCArtboard id="recipes-browse" label="R1 · Recipes — cookable-first, grouped" width={1280} height={1200}>
          <Recipes />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="plan"
        title="Meal plan — week 19"
        subtitle="7-day grid, inventory-aware. Pantry-only vs. shop-needed at a glance."
      >
        <DCArtboard id="plan-week" label="P1 · Plan — weekly grid" width={1280} height={1000}>
          <MealPlan />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="list"
        title="Shopping list — auto-built, agent-ready"
        subtitle="Grouped by aisle, with reasons, totals, and the Playwright handoff."
      >
        <DCArtboard id="list-main" label="L1 · List — aisles + checkout sidebar" width={1280} height={1100}>
          <ShoppingList />
        </DCArtboard>
      </DCSection>

      <DCPostIt x={40} y={40} w={280}>
        <strong>Locked:</strong> Crisp palette · Persimmon accent · Schibsted Grotesk + Lora italic.<br/><br/>
        <strong>New row:</strong> Inventory page — populated state, real data shape from the repo. React the way you usually do and I'll spin variants or push deeper.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
