<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>eat-thing — architecture map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Schibsted+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#f3f5f2; --paper2:#eaeee7; --cream:#e6ebe4;
  --ink:#0d1714; --ink2:#3a443e; --ink3:#5a6359; --mute:#6e7872;
  --green:#1f5d33; --fresh:#5aa758; --persimmon:#d96e2e; --persim-deep:#b6541d; --warn:#c2412e;
  --rule:rgba(13,23,20,.08); --rule2:rgba(13,23,20,.04);
  --font-sans:"Schibsted Grotesk",system-ui,-apple-system,sans-serif;
  --font-serif:"Lora",Georgia,serif;
  --radius-card:12px; --radius-control:8px; --radius-pill:999px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--font-sans); background:var(--paper); color:var(--ink);
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
.dot{color:var(--persimmon)}
.eyebrow{
  font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--mute); font-weight:600;
}

/* ── Top bar ── */
header.topbar{
  display:flex; align-items:baseline; gap:18px; padding:14px 22px;
  border-bottom:1px solid var(--rule); background:var(--paper);
  flex:0 0 auto; flex-wrap:wrap;
}
header.topbar h1{
  font-family:var(--font-serif); font-weight:500; font-size:24px;
  letter-spacing:-.02em; margin:0;
}
header.topbar .sub{ font-size:13px; color:var(--ink3); }
header.topbar .lens-tabs{ margin-left:auto; display:flex; gap:6px; }
.lens-tab{
  font:inherit; font-size:13px; font-weight:600; cursor:pointer;
  border:1px solid var(--rule); background:transparent; color:var(--ink2);
  padding:7px 14px; border-radius:var(--radius-pill); transition:.15s;
}
.lens-tab:hover{ border-color:var(--ink3); }
.lens-tab[aria-selected="true"]{
  background:var(--ink); color:var(--paper); border-color:var(--ink);
}

/* ── Body layout ── */
.shell{ flex:1 1 auto; display:flex; min-height:0; }

/* ── Left control rail ── */
aside.rail{
  flex:0 0 254px; border-right:1px solid var(--rule); background:var(--paper);
  overflow-y:auto; padding:18px 18px 40px;
}
.rail h2{
  font-family:var(--font-serif); font-weight:500; font-size:20px;
  margin:0 0 2px; letter-spacing:-.01em;
}
.rail .lens-desc{ font-size:12.5px; color:var(--ink3); line-height:1.5; margin:6px 0 18px; }
.rail section{ margin-bottom:22px; }
.rail .grp-title{ margin-bottom:9px; }
.toggle{
  display:flex; align-items:center; gap:9px; padding:5px 0; cursor:pointer;
  font-size:13px; color:var(--ink2); user-select:none;
}
.toggle input{ display:none; }
.swatch{
  width:13px; height:13px; border-radius:4px; flex:0 0 auto;
  border:1.5px solid currentColor; position:relative;
}
.line-swatch{
  width:20px; height:0; flex:0 0 auto; border-top-width:2.5px; border-top-style:solid;
  position:relative;
}
.line-swatch.dashed{ border-top-style:dashed; }
.toggle input:not(:checked) ~ .swatch{ opacity:.28; background:transparent !important; }
.toggle input:checked ~ .swatch{ background:currentColor; }
.toggle input:not(:checked) ~ .line-swatch{ opacity:.28; }
.toggle input:not(:checked) ~ .lbl{ opacity:.5; }
.toggle .lbl{ flex:1; }
.toggle .cnt{ font-size:11px; color:var(--mute); }
.rail .opt-toggle{
  display:flex; align-items:center; gap:9px; padding:6px 0; font-size:13px;
  color:var(--ink2); cursor:pointer; user-select:none;
}
.rail .opt-toggle input{
  appearance:none; width:34px; height:19px; border-radius:999px;
  background:var(--paper2); border:1px solid var(--rule); position:relative;
  cursor:pointer; transition:.18s; flex:0 0 auto;
}
.rail .opt-toggle input::after{
  content:""; position:absolute; top:1.5px; left:1.5px; width:14px; height:14px;
  border-radius:50%; background:var(--mute); transition:.18s;
}
.rail .opt-toggle input:checked{ background:var(--persimmon); border-color:var(--persimmon); }
.rail .opt-toggle input:checked::after{ left:16px; background:#fff; }
.btn{
  font:inherit; font-size:12.5px; font-weight:600; cursor:pointer;
  border:1px solid var(--rule); background:transparent; color:var(--ink2);
  padding:8px 12px; border-radius:var(--radius-control); width:100%;
  transition:.15s; margin-top:4px;
}
.btn:hover{ border-color:var(--ink3); background:var(--paper2); }

/* ── Canvas ── */
.canvas-wrap{ flex:1 1 auto; position:relative; overflow:auto; background:
  radial-gradient(circle at 1px 1px, rgba(13,23,20,.05) 1px, transparent 0) 0 0 / 26px 26px,
  var(--paper); }
.canvas{ position:relative; width:1640px; height:920px; }
svg.wire{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; }
.boundary-rect{ fill:rgba(13,23,20,.018); stroke:var(--rule); stroke-width:1.5; stroke-dasharray:7 6; }
.boundary-label{ font-family:var(--font-sans); font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; fill:var(--mute); }
.edge{ fill:none; stroke-width:2; opacity:.85; }
.edge-label{ font-family:var(--font-sans); font-size:10px; font-weight:600; fill:var(--ink3); paint-order:stroke; stroke:var(--paper); stroke-width:3px; }

.node{
  position:absolute; min-width:128px; max-width:184px; background:#fff;
  border:1px solid var(--rule); border-left-width:4px; border-radius:var(--radius-card);
  padding:10px 12px; cursor:grab; box-shadow:0 1px 2px rgba(13,23,20,.05);
  transition:box-shadow .15s, transform .05s; user-select:none;
}
.node:hover{ box-shadow:0 4px 14px rgba(13,23,20,.12); }
.node.dragging{ cursor:grabbing; box-shadow:0 10px 26px rgba(13,23,20,.18); z-index:50; }
.node.selected{ box-shadow:0 0 0 2px var(--persimmon), 0 6px 18px rgba(13,23,20,.14); }
.node .n-type{ font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; color:var(--mute); margin-bottom:3px; }
.node .n-name{ font-size:14px; font-weight:700; letter-spacing:-.01em; line-height:1.15; }
.node .n-sub{ font-size:11px; color:var(--ink3); line-height:1.3; margin-top:3px; font-family:var(--font-serif); font-style:italic; }
.node .n-flag{ display:inline-block; margin-top:6px; font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:2px 6px; border-radius:var(--radius-pill); }
.node--rich{ min-width:198px; max-width:234px; }
.n-eps{ margin-top:8px; padding-top:7px; border-top:1px solid var(--rule2); display:flex; flex-direction:column; gap:3px; }
.ep{ display:flex; align-items:center; gap:6px; }
.ep-m{ font-size:8.5px; font-weight:800; letter-spacing:.03em; padding:1.5px 4px; border-radius:4px; color:#fff; min-width:32px; text-align:center; flex:0 0 auto; }
.ep-GET{ background:var(--fresh); } .ep-POST{ background:var(--persimmon); }
.ep-PUT{ background:var(--green); } .ep-PATCH{ background:var(--ink3); } .ep-DEL{ background:var(--warn); }
.ep-p{ font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:10.5px; color:var(--ink2);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.d-ep{ padding:3px 0; }
.d-ep .ep-p{ white-space:normal; overflow:visible; font-size:11.5px; }

/* ── Detail panel ── */
aside.detail{
  position:absolute; top:0; right:0; height:100%; width:320px; background:var(--paper);
  border-left:1px solid var(--rule); box-shadow:-8px 0 24px rgba(13,23,20,.06);
  transform:translateX(100%); transition:transform .22s cubic-bezier(.4,0,.2,1);
  overflow-y:auto; padding:20px 20px 40px; z-index:80;
}
aside.detail.open{ transform:translateX(0); }
.detail .close{ position:absolute; top:14px; right:16px; cursor:pointer; border:none; background:none; font-size:20px; color:var(--mute); line-height:1; }
.detail .close:hover{ color:var(--ink); }
.detail .d-type{ margin-bottom:8px; }
.detail h3{ font-family:var(--font-serif); font-weight:500; font-size:26px; letter-spacing:-.015em; margin:0 0 4px; line-height:1.1; }
.detail .d-block{ margin-top:18px; }
.detail .d-block .eyebrow{ display:block; margin-bottom:6px; }
.detail .d-desc{ font-size:13.5px; line-height:1.55; color:var(--ink2); }
.detail .d-tech{ font-size:12.5px; color:var(--ink2); line-height:1.5; }
.detail .chips{ display:flex; flex-wrap:wrap; gap:6px; }
.detail .chip{ font-size:11px; font-weight:600; padding:3px 9px; border-radius:var(--radius-pill); background:var(--paper2); color:var(--ink2); border:1px solid var(--rule); }
.detail .chip.d{ cursor:default; }
.detail .conns{ list-style:none; margin:0; padding:0; }
.detail .conns li{ font-size:12.5px; padding:6px 0; border-bottom:1px solid var(--rule2); color:var(--ink2); display:flex; gap:8px; align-items:baseline; }
.detail .conns li .arrow{ color:var(--persimmon); font-weight:700; }
.detail .conns li .ct{ margin-left:auto; font-size:10px; color:var(--mute); text-transform:uppercase; letter-spacing:.06em; }
.detail .d-hide-btn{ font:inherit; font-size:13px; font-weight:600; cursor:pointer; width:100%;
  border:1px solid var(--rule); background:#fff; color:var(--ink2); border-radius:var(--radius-control);
  padding:10px 12px; transition:.15s; display:flex; align-items:center; justify-content:center; gap:8px; }
.detail .d-hide-btn:hover{ border-color:var(--ink3); background:var(--paper2); }
.detail .d-hide-btn svg{ width:15px; height:15px; flex:0 0 auto; }
.detail .d-hide-btn.is-hidden{ border-color:var(--persimmon); color:var(--persim-deep); }
.detail .d-hide-btn.is-hidden:hover{ background:rgba(217,110,46,.07); }

.hint{ position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:11.5px; color:var(--mute); background:var(--paper); padding:6px 14px;
  border:1px solid var(--rule); border-radius:var(--radius-pill); pointer-events:none; }

/* ── Flows: rail controls ── */
.flow-pick{ display:block; width:100%; text-align:left; padding:9px 11px; border:1px solid var(--rule);
  border-radius:8px; background:#fff; margin-bottom:7px; cursor:pointer; font:inherit; transition:.15s; }
.flow-pick:hover{ border-color:var(--ink3); }
.flow-pick[aria-selected=true]{ border-color:var(--persimmon); box-shadow:inset 3px 0 0 var(--persimmon); }
.flow-pick .fp-name{ display:block; font-weight:700; font-size:13px; letter-spacing:-.01em; }
.flow-pick .fp-sum{ display:block; font-size:11px; color:var(--ink3); font-family:var(--font-serif); font-style:italic; margin-top:1px; }
.playbar{ display:flex; gap:6px; margin-top:12px; }
.playbar button{ font:inherit; font-weight:700; cursor:pointer; border:1px solid var(--rule);
  background:#fff; color:var(--ink2); border-radius:8px; padding:9px 0; transition:.15s; }
.playbar button:hover{ border-color:var(--ink3); }
.playbar #prevBtn,.playbar #nextBtn{ flex:0 0 40px; font-size:16px; }
.playbar .play-main{ flex:1; background:var(--persimmon); border-color:var(--persimmon); color:#fff; font-size:13px; }
.playbar .play-main:hover{ background:var(--persim-deep); border-color:var(--persim-deep); }
.flow-legend-dd{ margin-top:16px; padding-top:13px; border-top:1px solid var(--rule); }
.flow-legend-dd summary{ cursor:pointer; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--mute); font-weight:600; list-style:none; display:flex; align-items:center; gap:7px; }
.flow-legend-dd summary::-webkit-details-marker{ display:none; }
.flow-legend-dd summary::before{ content:'▸'; font-size:9px; transition:transform .15s; }
.flow-legend-dd[open] summary::before{ transform:rotate(90deg); }
.flow-legend-dd #flowLegend{ margin-top:11px; }
.fl-leg-row{ display:flex; align-items:center; gap:9px; padding:3px 0; font-size:12px; color:var(--ink2); }

/* ── Flows: node + edge states ── */
.node.fl-active{ box-shadow:0 0 0 2px var(--persimmon), 0 10px 26px rgba(217,110,46,.30); }
.node.fl-dim{ opacity:.42; }
.node.fl-dim:hover{ opacity:.72; }
.edge.fl-active{ stroke-width:3.2; animation:dashflow .8s linear infinite; }
.edge.fl-done{ opacity:.5; stroke-width:2.4; }
.edge.fl-todo{ opacity:.14; stroke-width:2; }
@keyframes dashflow{ to{ stroke-dashoffset:-24; } }

/* ── Flows: UX strip ── */
.flow-strip{ position:fixed; left:254px; right:0; bottom:0; z-index:60;
  background:rgba(243,245,242,.97); backdrop-filter:blur(6px);
  border-top:1px solid var(--rule); padding:16px 26px 20px; box-shadow:0 -6px 22px rgba(13,23,20,.08);
  min-height:208px; display:flex; flex-direction:column; }
.fs-head{ display:flex; align-items:baseline; gap:14px; margin-bottom:12px; flex-wrap:wrap; }
.fs-flowname{ font-family:var(--font-serif); font-size:18px; font-weight:600; letter-spacing:-.01em; color:var(--ink); }
.fs-hop{ font-size:12px; font-weight:600; color:var(--ink3); display:inline-flex; align-items:center; gap:7px; }
.fs-hop .fs-dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
.fs-hop .fs-hop-arrow{ color:var(--mute); }
.fs-hop .fs-hop-kind{ color:var(--mute); text-transform:uppercase; letter-spacing:.08em; font-size:10px; }
.fs-counter{ margin-left:auto; font-size:11px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; color:var(--mute); }
.fs-steps{ display:flex; gap:7px; margin-bottom:14px; flex-wrap:wrap; }
.fs-pill{ width:28px; height:28px; border-radius:50%; border:1px solid var(--rule); background:#fff;
  font:inherit; font-size:12px; font-weight:700; color:var(--ink3); cursor:pointer; transition:.15s; }
.fs-pill:hover{ border-color:var(--ink3); }
.fs-pill.done{ background:var(--fresh); border-color:var(--fresh); color:#fff; }
.fs-pill.active{ background:var(--persimmon); border-color:var(--persimmon); color:#fff; box-shadow:0 0 0 3px rgba(217,110,46,.2); }
.fs-detail{ display:flex; flex-direction:column; gap:7px; }
.fs-line{ display:flex; align-items:baseline; gap:11px; }
.fs-tag{ font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px;
  border-radius:999px; flex:0 0 auto; min-width:64px; text-align:center; }
.fs-tag.you{ background:var(--ink); color:var(--paper); }
.fs-tag.sys{ background:var(--paper2); color:var(--ink2); border:1px solid var(--rule); }
.fs-text{ font-size:14.5px; color:var(--ink); line-height:1.45; }
.fs-line .fs-tag.sys ~ .fs-text{ font-size:13.5px; color:var(--ink2); }
.fs-tables{ font-size:12px; color:var(--mute); margin-top:4px; padding-left:75px; }
.fs-tables code{ background:var(--paper2); border:1px solid var(--rule); border-radius:4px; padding:2px 6px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; color:var(--ink2); margin-right:3px; }

/* ── Multi-select: marquee + selection bar ── */
.marquee{ position:absolute; border:1.5px solid var(--persimmon); background:rgba(217,110,46,.08);
  border-radius:4px; pointer-events:none; z-index:40; }
.sel-bar{ position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:70;
  display:flex; align-items:center; gap:10px; background:var(--ink); color:var(--paper);
  padding:7px 9px 7px 15px; border-radius:var(--radius-pill); box-shadow:0 6px 20px rgba(13,23,20,.22);
  font-size:12.5px; font-weight:600; }
.sel-bar button{ font:inherit; font-size:12px; font-weight:700; cursor:pointer; border:none;
  border-radius:var(--radius-pill); padding:5px 13px; transition:.15s; }
.sel-bar #selHide{ background:var(--persimmon); color:#fff; }
.sel-bar #selHide:hover{ background:var(--persim-deep); }
.sel-bar #selClear{ background:rgba(243,245,242,.16); color:var(--paper); }
.sel-bar #selClear:hover{ background:rgba(243,245,242,.30); }

/* ── Hidden-elements rail list ── */
#hiddenGroup .grp-title{ display:flex; align-items:center; justify-content:space-between; }
.hidden-showall{ font:inherit; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  cursor:pointer; border:none; background:none; color:var(--persimmon); padding:0; }
.hidden-showall:hover{ color:var(--persim-deep); text-decoration:underline; }
.hidden-row{ display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; color:var(--ink2); }
.hidden-dot{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
.hidden-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
.hidden-name:hover{ color:var(--ink); text-decoration:underline; }
.hidden-show{ font:inherit; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--rule);
  background:#fff; color:var(--ink2); border-radius:6px; padding:2px 9px; flex:0 0 auto; }
.hidden-show:hover{ border-color:var(--ink3); background:var(--paper2); }

@media (max-width:720px){ aside.rail{ flex-basis:200px; } .flow-strip{ left:200px; } }
</style>
</head>
<body>
<header class="topbar">
  <h1>eat-thing<span class="dot">.</span></h1>
  <span class="sub">architecture map — drag nodes, toggle layers, click for detail</span>
  <div class="lens-tabs" role="tablist" id="lensTabs"></div>
</header>

<div class="shell">
  <aside class="rail">
    <h2 id="lensTitle">Deployment<span class="dot">.</span></h2>
    <p class="lens-desc" id="lensDesc"></p>

    <section id="typeGroup">
      <div class="eyebrow grp-title" id="typeGroupTitle">Elements</div>
      <div id="typeToggles"></div>
    </section>

    <section id="connGroup">
      <div class="eyebrow grp-title">Connections</div>
      <div id="connToggles"></div>
    </section>

    <section id="optGroup">
      <div class="eyebrow grp-title">View</div>
      <label class="opt-toggle" id="boundaryOptWrap"><input type="checkbox" id="optBoundaries" checked><span>Trust boundaries</span></label>
      <label class="opt-toggle"><input type="checkbox" id="optLabels" checked><span>Connection labels</span></label>
    </section>

    <section id="hiddenGroup" style="display:none">
      <div class="eyebrow grp-title">Hidden<button class="hidden-showall" id="showAllBtn">show all</button></div>
      <div id="hiddenList"></div>
    </section>

    <section id="flowGroup" style="display:none">
      <div class="eyebrow grp-title">Choose a flow</div>
      <div id="flowList"></div>
      <div class="playbar">
        <button id="prevBtn" title="previous step">‹</button>
        <button id="playBtn" class="play-main">▶ Play</button>
        <button id="nextBtn" title="next step">›</button>
      </div>
      <button class="btn" id="restartBtn" style="margin-top:8px">↺ Restart</button>
      <div id="flowStepCount" style="margin-top:12px;font-size:12px;color:var(--mute);text-align:center"></div>
      <details class="flow-legend-dd" id="flowLegendDD">
        <summary>Hop types</summary>
        <div id="flowLegend"></div>
      </details>
    </section>

    <section id="resetSection">
      <button class="btn" id="exportBtn">⤓ Export PNG</button>
      <button class="btn" id="resetBtn">Reset this layout</button>
    </section>
  </aside>

  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas" id="canvas">
      <svg class="wire" id="wire"></svg>
    </div>
    <div class="sel-bar" id="selBar" style="display:none">
      <span id="selCount"></span>
      <button id="selHide">Hide</button>
      <button id="selClear">Clear</button>
    </div>
    <div class="hint" id="hint">positions auto-save to this browser</div>
  </div>

  <div class="flow-strip" id="flowStrip" style="display:none">
    <div class="fs-head">
      <span class="fs-flowname" id="fsFlowName"></span>
      <span class="fs-hop" id="fsHop"></span>
      <span class="fs-counter" id="fsCounter"></span>
    </div>
    <div class="fs-steps" id="fsSteps"></div>
    <div class="fs-detail">
      <div class="fs-line"><span class="fs-tag you">You</span><span id="fsUx" class="fs-text"></span></div>
      <div class="fs-line"><span class="fs-tag sys">System</span><span id="fsSys" class="fs-text"></span></div>
      <div class="fs-tables" id="fsTables"></div>
    </div>
  </div>

  <aside class="detail" id="detail">
    <button class="close" id="detailClose" aria-label="close">×</button>
    <div class="d-type"><span class="chip d" id="dType"></span></div>
    <h3 id="dName"></h3>
    <div class="d-block"><span class="eyebrow">What it is</span><div class="d-desc" id="dDesc"></div></div>
    <div class="d-block" id="dTechBlock"><span class="eyebrow">Stack</span><div class="d-tech" id="dTech"></div></div>
    <div class="d-block" id="dEpBlock"><span class="eyebrow">Endpoints</span><div id="dEps"></div></div>
    <div class="d-block" id="dDecBlock"><span class="eyebrow">Decisions</span><div class="chips" id="dDec"></div></div>
    <div class="d-block"><span class="eyebrow">Connections</span><ul class="conns" id="dConns"></ul></div>
    <div class="d-block" id="dActions"><button class="d-hide-btn" id="dHideBtn"></button></div>
  </aside>
</div>

/* ──────────────────────────── SVG defs (arrow) ─────────────────────────── */
function ensureDefs(){
  const NS='http://www.w3.org/2000/svg';
  const defs=document.createElementNS(NS,'defs');
  const allConns={};
  Object.values(LENSES).forEach(l=>Object.assign(allConns,l.conns));
  Object.entries(allConns)
    .forEach(([k,c])=>{
      const m=document.createElementNS(NS,'marker');
      m.setAttribute('id',`arr-${k}`); m.setAttribute('viewBox','0 0 10 10');
      m.setAttribute('refX','9'); m.setAttribute('refY','5');
      m.setAttribute('markerWidth','7'); m.setAttribute('markerHeight','7');
      m.setAttribute('orient','auto-start-reverse');
      const p=document.createElementNS(NS,'path');
      p.setAttribute('d','M0,0 L10,5 L0,10 z'); p.setAttribute('fill',c.color);
      m.appendChild(p); defs.appendChild(m);
    });
  wire.appendChild(defs);
}

    const b=document.createElement('button');
    b.className='lens-tab'; b.textContent=l.tabLabel; b.setAttribute('role','tab');
    b.setAttribute('aria-selected', key===currentLens);
    b.onclick=()=>switchLens(key);
    wrap.appendChild(b);
  });
}

function loadToggleState(lens){
  const L=LENSES[lens];
  const savedT=JSON.parse(localStorage.getItem(LS.type(lens))||'null');
  const savedC=JSON.parse(localStorage.getItem(LS.conn(lens))||'null');
  const savedO=JSON.parse(localStorage.getItem(LS.opt(lens))||'null');
  enabled.types=new Set(savedT||Object.keys(L.types));
  enabled.conns=new Set(savedC||Object.keys(L.conns));
  showBoundaries = savedO ? savedO.boundaries : true;
  showLabels = savedO ? savedO.labels : true;
  const savedH=JSON.parse(localStorage.getItem(LS.hidden(lens))||'null');
  hidden.clear(); (savedH||[]).forEach(id=>hidden.add(id));
}
function saveToggleState(){
  localStorage.setItem(LS.type(currentLens),JSON.stringify([...enabled.types]));
  localStorage.setItem(LS.conn(currentLens),JSON.stringify([...enabled.conns]));
  localStorage.setItem(LS.opt(currentLens),JSON.stringify({boundaries:showBoundaries,labels:showLabels}));
  localStorage.setItem(LS.hidden(currentLens),JSON.stringify([...hidden]));
}

function buildToggles(){
  const L=LENSES[currentLens];
  // count nodes per type / edges per conn
  const typeCount={}, connCount={};
  L.nodes.forEach(n=>typeCount[n.type]=(typeCount[n.type]||0)+1);
  L.edges.forEach(e=>connCount[e.type]=(connCount[e.type]||0)+1);

  const tWrap=$('#typeToggles'); tWrap.innerHTML='';
  Object.entries(L.types).forEach(([k,t])=>{
    const lab=document.createElement('label'); lab.className='toggle'; lab.style.color=t.color;
    lab.innerHTML=`<input type="checkbox" ${enabled.types.has(k)?'checked':''}>
      <span class="swatch"></span><span class="lbl">${t.label}</span><span class="cnt">${typeCount[k]||0}</span>`;
    lab.querySelector('input').onchange=(e)=>{
      e.target.checked?enabled.types.add(k):enabled.types.delete(k);
      saveToggleState(); render();
    };
    tWrap.appendChild(lab);
  });

  const cWrap=$('#connToggles'); cWrap.innerHTML='';
  Object.entries(L.conns).forEach(([k,c])=>{
    const lab=document.createElement('label'); lab.className='toggle'; lab.style.color=c.color;
    lab.innerHTML=`<input type="checkbox" ${enabled.conns.has(k)?'checked':''}>
      <span class="line-swatch ${c.dashed?'dashed':''}"></span><span class="lbl">${c.label}</span><span class="cnt">${connCount[k]||0}</span>`;
    lab.querySelector('input').onchange=(e)=>{
      e.target.checked?enabled.conns.add(k):enabled.conns.delete(k);
      saveToggleState(); render();
    };
    cWrap.appendChild(lab);
  });

  // boundaries option only when the lens has them
  $('#boundaryOptWrap').style.display = L.hasBoundaries ? '' : 'none';
  $('#optBoundaries').checked = showBoundaries;
  $('#optLabels').checked = showLabels;

  buildHiddenList();
}

/* ── Individually-hidden elements: rail list + restore ── */
function buildHiddenList(){
  const sec=$('#hiddenGroup'), host=$('#hiddenList'); if(!sec||!host) return;
  const L=LENSES[currentLens];
  if(isFlowsLens() || !hidden.size){ sec.style.display='none'; host.innerHTML=''; return; }
  sec.style.display=''; host.innerHTML='';
  [...hidden].forEach(id=>{
    const n=L.nodes.find(x=>x.id===id); if(!n) return;
    const t=L.types[n.type];
    const row=document.createElement('div'); row.className='hidden-row';
    row.innerHTML=`<span class="hidden-dot" style="background:${t.color}"></span>`+
      `<span class="hidden-name">${n.name}</span><button class="hidden-show">show</button>`;
    row.querySelector('.hidden-name').onclick=()=>openDetail(n);
    row.querySelector('.hidden-show').onclick=()=>showNodes([id]);
    host.appendChild(row);
  });
}
function showNodes(ids){
  ids.forEach(id=>hidden.delete(id));
  saveToggleState(); buildNodes(); buildHiddenList(); growCanvas(); updateSelectionStyles(); renderWire();
}

/* ──────────────────────────────── NODES ───────────────────────────────── */
function nodePos(lens,n){
  const saved=localStorage.getItem(LS.pos(lens,n.id));
  if(saved){ try{ const p=JSON.parse(saved); return {x:p.x,y:p.y}; }catch(e){} }
  return {x:n.x,y:n.y};
}
function buildNodes(){
  // remove old nodes (keep svg)
  Object.values(nodeEls).forEach(el=>el.remove()); nodeEls={};
  const L=LENSES[currentLens];
  L.nodes.forEach(n=>{
    if(hidden.has(n.id)) return;
    const t=L.types[n.type];
    const el=document.createElement('div');
    el.className='node'+(n.endpoints?' node--rich':''); el.dataset.id=n.id; el.dataset.type=n.type;
    el.style.borderLeftColor=t.color;
    const flag = n.flag ? `<span class="n-flag" style="background:${t.color}1a;color:${t.color}">${n.flag}</span>` : '';
    const eps = n.endpoints ? `<div class="n-eps">`+n.endpoints.map(e=>
      `<div class="ep"><span class="ep-m ep-${e.m}">${e.m}</span><span class="ep-p">${e.p}</span></div>`).join('')+`</div>` : '';
    el.innerHTML=`<div class="n-type" style="color:${t.color}">${t.label}</div>
      <div class="n-name">${n.name}</div>${n.sub?`<div class="n-sub">${n.sub}</div>`:''}${flag}${eps}`;
    const p=nodePos(currentLens,n);
    el.style.left=p.x+'px'; el.style.top=p.y+'px';
    canvas.appendChild(el);
    nodeEls[n.id]=el;
    makeDraggable(el,n);
  });
  updateSelectionStyles();
}

function makeDraggable(el,n){
  let sx,sy,moved=false,dragging=false,group=[];
  el.addEventListener('pointerdown',(e)=>{
    if(e.button!==0) return;
    const multiKey = e.shiftKey||e.metaKey||e.ctrlKey;
    if(!isFlowsLens() && multiKey){
      // toggle this node in/out of the selection — no drag, no detail
      toggleSel(n.id); e.stopPropagation(); return;
    }
    // a plain grab on an unselected node makes it the sole selection
    if(!isFlowsLens() && !selectedIds.has(n.id)) selectOnly(n.id);
    dragging=true; moved=false; sx=e.clientX; sy=e.clientY;
    // move the whole selection when grabbing one of several selected nodes
    const ids = (!isFlowsLens() && selectedIds.has(n.id) && selectedIds.size>1)
      ? [...selectedIds] : [n.id];
    group = ids.map(id=>nodeEls[id]).filter(Boolean).map(g=>({
      el:g, id:g.dataset.id, ox:parseFloat(g.style.left), oy:parseFloat(g.style.top) }));
    el.setPointerCapture(e.pointerId); el.classList.add('dragging');
  });
  el.addEventListener('pointermove',(e)=>{
    if(!dragging) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    group.forEach(g=>{ g.el.style.left=Math.max(0,g.ox+dx)+'px'; g.el.style.top=Math.max(0,g.oy+dy)+'px'; });
    renderWire();
  });
  el.addEventListener('pointerup',(e)=>{
    if(!dragging) return; dragging=false; el.classList.remove('dragging');
    if(moved){
      group.forEach(g=>localStorage.setItem(LS.pos(currentLens,g.id),
        JSON.stringify({x:parseFloat(g.el.style.left),y:parseFloat(g.el.style.top)})));
      growCanvas();
    } else {
      if(!isFlowsLens()) selectOnly(n.id);
      openDetail(n);
    }
  });
}

/* ── Selection helpers ─────────────────────────────────────────────────── */
function updateSelectionStyles(){
  Object.entries(nodeEls).forEach(([id,el])=>el.classList.toggle('selected', selectedIds.has(id)));
}
function updateSelBar(){
  const bar=$('#selBar'); if(!bar) return;
  if(isFlowsLens() || !selectedIds.size){ bar.style.display='none'; return; }
  bar.style.display=''; $('#selCount').textContent=`${selectedIds.size} selected`;
}
function selectOnly(id){ selectedIds.clear(); selectedIds.add(id); updateSelectionStyles(); updateSelBar(); renderWire(); }
function toggleSel(id){
  selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);
  updateSelectionStyles(); updateSelBar(); renderWire();
}
function clearSelection(){ selectedIds.clear(); updateSelectionStyles(); updateSelBar(); renderWire(); }
function selectAllVisible(){
  selectedIds.clear();
  LENSES[currentLens].nodes.forEach(n=>{ if(isVisible(n.id)) selectedIds.add(n.id); });
  updateSelectionStyles(); updateSelBar(); renderWire();
}
function hideSelected(){
  if(isFlowsLens() || !selectedIds.size) return;
  selectedIds.forEach(id=>hidden.add(id)); selectedIds.clear();
  saveToggleState(); closeDetail();
  buildNodes(); buildHiddenList(); growCanvas(); updateSelBar(); renderWire();
}

/* ─────────────────────────── WIRE (edges + boundaries) ─────────────────── */
const NS='http://www.w3.org/2000/svg';
function centerOf(id){
  const el=nodeEls[id]; if(!el) return null;
  return { x:el.offsetLeft+el.offsetWidth/2, y:el.offsetTop+el.offsetHeight/2,
           w:el.offsetWidth, h:el.offsetHeight, l:el.offsetLeft, t:el.offsetTop };
}
// where a line from a→b crosses a's rectangle border
function edgePoint(a,b){
  const dx=b.x-a.x, dy=b.y-a.y;
  if(dx===0&&dy===0) return {x:a.x,y:a.y};
  const hw=a.w/2+4, hh=a.h/2+4;
  const sx=dx===0?Infinity:hw/Math.abs(dx);
  const sy=dy===0?Infinity:hh/Math.abs(dy);
  const s=Math.min(sx,sy);
  return { x:a.x+dx*s, y:a.y+dy*s };
}
function isVisible(id){
  const n=LENSES[currentLens].nodes.find(x=>x.id===id);
  return n && enabled.types.has(n.type) && !hidden.has(id);
}
function renderWire(){
  if(LENSES[currentLens].flows) return renderFlowWire();
  const L=LENSES[currentLens];
  // wipe everything except defs
  [...wire.querySelectorAll('.edge,.edge-label,.boundary-rect,.boundary-label')].forEach(e=>e.remove());

  // boundaries first (behind)
  if(L.hasBoundaries && showBoundaries){
    Object.entries(L.boundaries).forEach(([name,ids])=>{
      const pts=ids.filter(isVisible).map(centerOf).filter(Boolean);
      if(!pts.length) return;
      let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
      pts.forEach(p=>{ minX=Math.min(minX,p.l); minY=Math.min(minY,p.t);
        maxX=Math.max(maxX,p.l+p.w); maxY=Math.max(maxY,p.t+p.h); });
      const pad=22;
      const r=document.createElementNS(NS,'rect');
      r.setAttribute('class','boundary-rect');
      r.setAttribute('x',minX-pad); r.setAttribute('y',minY-pad-12);
      r.setAttribute('width',(maxX-minX)+pad*2); r.setAttribute('height',(maxY-minY)+pad*2+12);
      r.setAttribute('rx',16);
      wire.appendChild(r);
      const lab=document.createElementNS(NS,'text');
      lab.setAttribute('class','boundary-label');
      lab.setAttribute('x',minX-pad+4); lab.setAttribute('y',minY-pad-12+2);
      lab.textContent=name; wire.appendChild(lab);
    });
  }

  // edges
  L.edges.forEach(e=>{
    if(!enabled.conns.has(e.type)) return;
    if(!isVisible(e.from)||!isVisible(e.to)) return;
    const a=centerOf(e.from), b=centerOf(e.to); if(!a||!b) return;
    const c=L.conns[e.type];
    const p1=edgePoint(a,b), p2=edgePoint(b,a);
    const line=document.createElementNS(NS,'path');
    line.setAttribute('class','edge');
    line.setAttribute('d',`M${p1.x},${p1.y} L${p2.x},${p2.y}`);
    line.setAttribute('stroke',c.color);
    if(c.dashed) line.setAttribute('stroke-dasharray','6 5');
    line.setAttribute('marker-end',`url(#arr-${e.type})`);
    const hasSel=selectedIds.size>0;
    const isSel=selectedIds.has(e.from)||selectedIds.has(e.to);
    line.style.opacity = !hasSel ? .85 : (isSel?1:.18);
    if(isSel) line.setAttribute('stroke-width','2.6');
    wire.appendChild(line);
    if(showLabels && e.label){
      const lab=document.createElementNS(NS,'text');
      lab.setAttribute('class','edge-label');
      lab.setAttribute('x',(p1.x+p2.x)/2); lab.setAttribute('y',(p1.y+p2.y)/2-3);
      lab.setAttribute('text-anchor','middle'); lab.textContent=e.label;
      lab.style.opacity = !hasSel||isSel?1:.2;
      wire.appendChild(lab);
    }
  });
}

function growCanvas(){
  // make sure canvas extends past the furthest node
  let maxX=1200,maxY=700;
  Object.values(nodeEls).forEach(el=>{
    maxX=Math.max(maxX,el.offsetLeft+el.offsetWidth);
    maxY=Math.max(maxY,el.offsetTop+el.offsetHeight);
  });
  canvas.style.width=(maxX+120)+'px';
  canvas.style.height=(maxY+160)+'px';
}

/* ──────────────────────────────── FLOWS ───────────────────────────────── */
function buildFlowControls(){
  const host=$('#flowList'); host.innerHTML='';
  LENSES[currentLens].flows.forEach((f,i)=>{
    const b=document.createElement('button');
    b.className='flow-pick'; b.setAttribute('aria-selected', i===activeFlowIdx);
    b.innerHTML=`<span class="fp-name">${f.name}</span><span class="fp-sum">${f.summary}</span>`;
    b.onclick=()=>{ stopPlay(); setFlow(i,true); buildFlowControls(); };
    host.appendChild(b);
  });
  const leg=$('#flowLegend'); leg.innerHTML='';
  Object.values(LENSES[currentLens].conns).forEach(c=>{
    const row=document.createElement('div'); row.className='fl-leg-row'; row.style.color=c.color;
    row.innerHTML=`<span class="line-swatch ${c.dashed?'dashed':''}" style="opacity:1"></span><span style="color:var(--ink2)">${c.label}</span>`;
    leg.appendChild(row);
  });
}
function buildStepPills(){
  const host=$('#fsSteps'); host.innerHTML='';
  LENSES[currentLens].flows[activeFlowIdx].steps.forEach((s,i)=>{
    const p=document.createElement('button');
    p.className='fs-pill'; p.textContent=i+1; p.title=s.ux;
    p.onclick=()=>{ stopPlay(); setStep(i); };
    host.appendChild(p);
  });
}
function setFlow(i,reset){
  activeFlowIdx=i;
  if(reset) currentStep=0;
  buildStepPills();
  renderFlowStep();
}
function setStep(i){
  const len=LENSES[currentLens].flows[activeFlowIdx].steps.length;
  currentStep=Math.max(0,Math.min(len-1,i));
  renderFlowStep();
}
function renderFlowStep(){
  const flow=LENSES[currentLens].flows[activeFlowIdx];
  const step=flow.steps[currentStep];
  Object.entries(nodeEls).forEach(([id,el])=>{
    el.classList.remove('fl-active','fl-dim');
    if(id===step.from||id===step.to) el.classList.add('fl-active'); else el.classList.add('fl-dim');
  });
  renderFlowWire();
  [...document.querySelectorAll('.fs-pill')].forEach((p,i)=>{
    p.classList.toggle('active', i===currentStep);
    p.classList.toggle('done', i<currentStep);
  });
  $('#fsUx').textContent=step.ux;
  $('#fsSys').textContent=step.sys;
  $('#fsTables').innerHTML = step.tables&&step.tables.length
    ? 'touches '+step.tables.map(t=>`<code>${t}</code>`).join(' ') : '';
  // header: flow name · current hop (layer → layer · kind) · counter
  const L=LENSES[currentLens];
  const nameOf=(id)=>{ const n=L.nodes.find(x=>x.id===id); return n?n.name:id; };
  const c=L.conns[step.type];
  $('#fsFlowName').textContent=flow.name;
  $('#fsHop').innerHTML=`<span class="fs-dot" style="background:${c.color}"></span>`+
    `<span>${nameOf(step.from)}</span><span class="fs-hop-arrow">→</span><span>${nameOf(step.to)}</span>`+
    `<span class="fs-hop-kind">${c.label}</span>`;
  $('#fsCounter').textContent=`Step ${currentStep+1} / ${flow.steps.length}`;
  const sc=$('#flowStepCount'); if(sc) sc.textContent=`Step ${currentStep+1} / ${flow.steps.length}`;
}
function renderFlowWire(){
  [...wire.querySelectorAll('.edge,.edge-label,.boundary-rect,.boundary-label')].forEach(e=>e.remove());
  const flow=LENSES[currentLens].flows[activeFlowIdx];
  const drawEdge=(s,state)=>{
    const a=centerOf(s.from), b=centerOf(s.to); if(!a||!b) return;
    const c=LENSES[currentLens].conns[s.type];
    const p1=edgePoint(a,b), p2=edgePoint(b,a);
    const line=document.createElementNS(NS,'path');
    line.setAttribute('class','edge fl-'+state);
    line.setAttribute('d',`M${p1.x},${p1.y} L${p2.x},${p2.y}`);
    line.setAttribute('stroke',c.color);
    if(state==='active') line.setAttribute('stroke-dasharray','7 5');
    else if(c.dashed) line.setAttribute('stroke-dasharray','6 5');
    line.setAttribute('marker-end',`url(#arr-${s.type})`);
    wire.appendChild(line);
  };
  // draw order ensures the active hop sits on top of any overlapping path
  flow.steps.forEach((s,i)=>{ if(i>currentStep) drawEdge(s,'todo'); });
  flow.steps.forEach((s,i)=>{ if(i<currentStep) drawEdge(s,'done'); });
  flow.steps.forEach((s,i)=>{ if(i===currentStep) drawEdge(s,'active'); });
}
function updatePlayBtn(){ const b=$('#playBtn'); if(b) b.textContent = playing ? '⏸ Pause' : '▶ Play'; }
function play(){
  const steps=LENSES[currentLens].flows[activeFlowIdx].steps;
  if(currentStep>=steps.length-1) setStep(0); // restart from the top
  playing=true; updatePlayBtn();
  clearInterval(playTimer);
  playTimer=setInterval(()=>{
    const steps=LENSES[currentLens].flows[activeFlowIdx].steps;
    if(currentStep>=steps.length-1){ stopPlay(); return; }
    setStep(currentStep+1);
  },1700);
}
function stopPlay(){ playing=false; clearInterval(playTimer); playTimer=null; updatePlayBtn(); }
function togglePlay(){ playing?stopPlay():play(); }

/* ──────────────────────────────── EXPORT ──────────────────────────────── */
function exportPNG(){
  const svgNS='http://www.w3.org/2000/svg';
  // tight bounds around visible nodes (+ margin) so the export isn't mostly empty canvas
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  const vis=Object.entries(nodeEls).filter(([,el])=>el.style.display!=='none');
  vis.forEach(([,el])=>{ minX=Math.min(minX,el.offsetLeft); minY=Math.min(minY,el.offsetTop);
    maxX=Math.max(maxX,el.offsetLeft+el.offsetWidth); maxY=Math.max(maxY,el.offsetTop+el.offsetHeight); });
  const m=48; minX-=m; minY-=m; maxX+=m; maxY+=m;
  const w=Math.ceil(maxX-minX), h=Math.ceil(maxY-minY);

  const out=document.createElementNS(svgNS,'svg');
  out.setAttribute('xmlns',svgNS); out.setAttribute('width',w); out.setAttribute('height',h);
  out.setAttribute('viewBox',`${minX} ${minY} ${w} ${h}`);
  const bg=document.createElementNS(svgNS,'rect');
  bg.setAttribute('x',minX); bg.setAttribute('y',minY); bg.setAttribute('width',w); bg.setAttribute('height',h);
  bg.setAttribute('fill','#f3f5f2'); out.appendChild(bg);
  // wires (defs + edges + boundaries) exactly as drawn
  [...wire.childNodes].forEach(n=>{ if(n.nodeType===1) out.appendChild(n.cloneNode(true)); });
  // nodes as rect + text
  const L=LENSES[currentLens];
  const mkText=(g,tx,x,y,size,weight,color,italic)=>{ const e=document.createElementNS(svgNS,'text');
    e.setAttribute('x',x); e.setAttribute('y',y); e.setAttribute('fill',color);
    e.setAttribute('font-family', italic?'Lora, Georgia, serif':'Schibsted Grotesk, system-ui, sans-serif');
    e.setAttribute('font-size',size); e.setAttribute('font-weight',weight);
    if(italic) e.setAttribute('font-style','italic'); e.textContent=tx; g.appendChild(e); };
  vis.forEach(([id,el])=>{
    const n=L.nodes.find(z=>z.id===id); if(!n) return; const t=L.types[n.type];
    const x=el.offsetLeft, y=el.offsetTop, nw=el.offsetWidth, nh=el.offsetHeight;
    const g=document.createElementNS(svgNS,'g');
    const r=document.createElementNS(svgNS,'rect');
    r.setAttribute('x',x); r.setAttribute('y',y); r.setAttribute('width',nw); r.setAttribute('height',nh);
    r.setAttribute('rx',12); r.setAttribute('fill','#ffffff'); r.setAttribute('stroke','rgba(13,23,20,.10)'); g.appendChild(r);
    const bar=document.createElementNS(svgNS,'rect');
    bar.setAttribute('x',x); bar.setAttribute('y',y); bar.setAttribute('width',4); bar.setAttribute('height',nh);
    bar.setAttribute('fill',t.color); g.appendChild(bar);
    mkText(g, t.label.toUpperCase(), x+13, y+19, 9, 700, t.color, false);
    mkText(g, n.name, x+13, y+38, 14, 700, '#0d1714', false);
    if(n.sub) mkText(g, n.sub, x+13, y+54, 11, 400, '#5a6359', true);
    if(n.endpoints){
      const mc={GET:C.fresh,POST:C.persimmon,PUT:C.green,PATCH:C.ink3,DEL:C.warn};
      [...el.querySelectorAll('.ep')].forEach((epEl,idx)=>{
        const ep=n.endpoints[idx]; const ey=y+epEl.offsetTop, mw=34;
        const mr=document.createElementNS(svgNS,'rect');
        mr.setAttribute('x',x+13); mr.setAttribute('y',ey); mr.setAttribute('width',mw); mr.setAttribute('height',13);
        mr.setAttribute('rx',3); mr.setAttribute('fill',mc[ep.m]||C.mute); g.appendChild(mr);
        const mt=document.createElementNS(svgNS,'text');
        mt.setAttribute('x',x+13+mw/2); mt.setAttribute('y',ey+9.5); mt.setAttribute('text-anchor','middle');
        mt.setAttribute('font-family','Schibsted Grotesk, sans-serif'); mt.setAttribute('font-size',8); mt.setAttribute('font-weight',800); mt.setAttribute('fill','#fff');
        mt.textContent=ep.m; g.appendChild(mt);
        mkText(g, ep.p, x+13+mw+6, ey+10, 10, 400, '#3a443e', false);
      });
    }
    out.appendChild(g);
  });

  const xml=new XMLSerializer().serializeToString(out);
  const url=URL.createObjectURL(new Blob([xml],{type:'image/svg+xml;charset=utf-8'}));
  const img=new Image(); const scale=2;
  img.onload=()=>{
    const cv=document.createElement('canvas'); cv.width=w*scale; cv.height=h*scale;
    const ctx=cv.getContext('2d'); ctx.scale(scale,scale); ctx.drawImage(img,0,0);
    URL.revokeObjectURL(url);
    cv.toBlob(b=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(b);
      a.download=`eat-thing-${currentLens}.png`; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href),2000); });
  };
  img.onerror=()=>{ URL.revokeObjectURL(url); alert('Export failed — try again.'); };
  img.src=url;
}

/* ──────────────────────────────── DETAIL ──────────────────────────────── */
function openDetail(n){
  const L=LENSES[currentLens]; const t=L.types[n.type];
  selectedId=n.id;
  $('#dType').textContent=t.label; $('#dType').style.color=t.color; $('#dType').style.borderColor=t.color;
  $('#dName').textContent=n.name;
  $('#dDesc').textContent=n.desc||'';
  if(n.tech){ $('#dTechBlock').style.display=''; $('#dTech').textContent=n.tech; }
  else $('#dTechBlock').style.display='none';
  if(n.endpoints&&n.endpoints.length){
    $('#dEpBlock').style.display='';
    $('#dEps').innerHTML=n.endpoints.map(e=>{
      const full=(n.sub||'')+(e.p==='/'?'':e.p);
      return `<div class="ep d-ep"><span class="ep-m ep-${e.m}">${e.m}</span><span class="ep-p">${full}</span></div>`;
    }).join('');
  } else $('#dEpBlock').style.display='none';
  if(n.decisions&&n.decisions.length){
    $('#dDecBlock').style.display='';
    $('#dDec').innerHTML=n.decisions.map(d=>`<span class="chip d">${d}</span>`).join('');
  } else $('#dDecBlock').style.display='none';
  // connections
  const conns=[];
  L.edges.forEach(e=>{
    if(e.from===n.id){ const o=L.nodes.find(x=>x.id===e.to); if(o) conns.push({dir:'→',name:o.name,ct:L.conns[e.type].label}); }
    if(e.to===n.id){ const o=L.nodes.find(x=>x.id===e.from); if(o) conns.push({dir:'←',name:o.name,ct:L.conns[e.type].label}); }
  });
  $('#dConns').innerHTML = conns.length
    ? conns.map(c=>`<li><span class="arrow">${c.dir}</span><span>${c.name}</span><span class="ct">${c.ct}</span></li>`).join('')
    : '<li style="color:var(--mute)">no connections in this lens</li>';
  // hide / show toggle (not on flow lenses)
  const actions=$('#dActions'), hideBtn=$('#dHideBtn');
  if(isFlowsLens()){ actions.style.display='none'; }
  else {
    actions.style.display='';
    const isHidden=hidden.has(n.id);
    hideBtn.classList.toggle('is-hidden', isHidden);
    hideBtn.innerHTML = isHidden
      ? `${EYE_SVG}<span>Show element</span>`
      : `${EYE_OFF_SVG}<span>Hide element</span>`;
    hideBtn.onclick=()=>toggleHideFromDetail(n);
  }
  detail.classList.add('open');
  renderWire();
}
const EYE_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_OFF_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
function toggleHideFromDetail(n){
  if(hidden.has(n.id)){
    hidden.delete(n.id); saveToggleState();
    buildNodes(); buildHiddenList(); growCanvas();
    selectOnly(n.id);
  } else {
    hidden.add(n.id); selectedIds.delete(n.id); saveToggleState();
    buildNodes(); buildHiddenList(); growCanvas();
  }
  openDetail(n); // refresh the button label + canvas state, keep panel open
}
function closeDetail(){
  detail.classList.remove('open'); selectedId=null;
  renderWire();
}
$('#detailClose').onclick=()=>{ closeDetail(); clearSelection(); };

/* ──────────────────────────────── RENDER ──────────────────────────────── */
function render(){ renderWire(); }

function switchLens(key){
  stopPlay();
  currentLens=key; localStorage.setItem(LS.lens,key);
  closeDetail(); clearSelection();
  document.querySelectorAll('.lens-tab').forEach((b,i)=>{
    b.setAttribute('aria-selected', Object.keys(LENSES)[i]===key);
  });
  const L=LENSES[key];
  $('#lensTitle').innerHTML=`${L.title}<span class="dot">.</span>`;
  $('#lensDesc').textContent=L.desc;
  loadToggleState(key);

  const isFlows = !!LENSES[key].flows;
  if(isFlows){ activeFlowIdx=0; currentStep=0; }
  $('#typeGroup').style.display   = isFlows?'none':'';
  $('#connGroup').style.display   = isFlows?'none':'';
  $('#optGroup').style.display    = isFlows?'none':'';
  $('#flowGroup').style.display   = isFlows?'':'none';
  $('#flowStrip').style.display   = isFlows?'':'none';
  $('#hint').style.display        = isFlows?'none':'';
  $('#hint').textContent          = 'drag to box-select · ⇧/⌘-click to add · H hides · positions auto-save';

  if(isFlows){ $('#hiddenGroup').style.display='none'; buildFlowControls(); }
  else buildToggles();
  buildNodes();
  growCanvas();
  if(isFlows) setFlow(activeFlowIdx,true); else renderWire();
  wrap.scrollTo(0,0);
}

/* options */
$('#optBoundaries').onchange=(e)=>{ showBoundaries=e.target.checked; saveToggleState(); renderWire(); };
$('#optLabels').onchange=(e)=>{ showLabels=e.target.checked; saveToggleState(); renderWire(); };
$('#resetBtn').onclick=()=>{
  LENSES[currentLens].nodes.forEach(n=>localStorage.removeItem(LS.pos(currentLens,n.id)));
  buildNodes(); growCanvas(); renderWire();
};

/* ── Marquee box-select on empty canvas ─────────────────────────────────── */
let marquee=null, mqStart=null, mqBase=null;
function canvasCoords(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function marqueeHits(x,y,w,h){
  const hits=new Set();
  Object.entries(nodeEls).forEach(([id,el])=>{
    const l=el.offsetLeft, t=el.offsetTop, r=l+el.offsetWidth, b=t+el.offsetHeight;
    if(l<x+w && r>x && t<y+h && b>y) hits.add(id);
  });
  return hits;
}
wrap.addEventListener('pointerdown',(e)=>{
  if(e.button!==0) return;
  if(!(e.target===wrap||e.target===canvas||e.target===wire)) return; // empty space only
  if(isFlowsLens()){ closeDetail(); clearSelection(); return; }
  mqBase = (e.shiftKey||e.metaKey||e.ctrlKey) ? new Set(selectedIds) : new Set();
  mqStart = canvasCoords(e);
  marquee=document.createElement('div'); marquee.className='marquee';
  marquee.style.left=mqStart.x+'px'; marquee.style.top=mqStart.y+'px';
  canvas.appendChild(marquee);
  wrap.setPointerCapture(e.pointerId);
});
wrap.addEventListener('pointermove',(e)=>{
  if(!marquee) return;
  const c=canvasCoords(e);
  const x=Math.min(c.x,mqStart.x), y=Math.min(c.y,mqStart.y);
  const w=Math.abs(c.x-mqStart.x), h=Math.abs(c.y-mqStart.y);
  marquee.style.left=x+'px'; marquee.style.top=y+'px'; marquee.style.width=w+'px'; marquee.style.height=h+'px';
  selectedIds.clear(); mqBase.forEach(id=>selectedIds.add(id));
  marqueeHits(x,y,w,h).forEach(id=>selectedIds.add(id));
  updateSelectionStyles(); updateSelBar(); renderWire();
});
wrap.addEventListener('pointerup',()=>{
  if(!marquee) return;
  const wasClick = parseFloat(marquee.style.width||0)<4 && parseFloat(marquee.style.height||0)<4;
  marquee.remove(); marquee=null;
  if(wasClick){ clearSelection(); closeDetail(); }
});

/* selection-bar actions */
$('#selHide').onclick=hideSelected;
$('#selClear').onclick=()=>{ clearSelection(); closeDetail(); };
$('#showAllBtn').onclick=()=>{ if(hidden.size) showNodes([...hidden]); };

/* keyboard: H hides selection, Esc clears, ⌘/Ctrl-A selects all visible */
window.addEventListener('keydown',(e)=>{
  if(/INPUT|TEXTAREA|SELECT/.test(e.target.tagName)) return;
  if(isFlowsLens()) return;
  if(e.key==='Escape'){ clearSelection(); closeDetail(); return; }
  if((e.metaKey||e.ctrlKey) && (e.key==='a'||e.key==='A')){ e.preventDefault(); selectAllVisible(); return; }
  if((e.key==='h'||e.key==='H'||e.key==='Backspace'||e.key==='Delete') && selectedIds.size){
    e.preventDefault(); hideSelected();
  }
});

/* flow playback controls */
$('#playBtn').onclick=togglePlay;
$('#prevBtn').onclick=()=>{ stopPlay(); setStep(currentStep-1); };
$('#nextBtn').onclick=()=>{ stopPlay(); setStep(currentStep+1); };
$('#restartBtn').onclick=()=>{ stopPlay(); setStep(0); };
$('#exportBtn').onclick=exportPNG;

/* ──────────────────────────────── INIT ────────────────────────────────── */
ensureDefs();
buildTabs();
switchLens(currentLens);
window.addEventListener('resize',renderWire);
</script>
